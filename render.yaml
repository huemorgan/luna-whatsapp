# Render blueprint for the always-on WhatsApp gateway.
# Deploy: push this repo to GitHub, then in Render → New → Blueprint, pick the repo.
# Set WA_SHARED_SECRET, GATEWAY_ADMIN_KEY, and LUNA_INBOUND_URL in the dashboard
# (they are sync:false so they are not stored in git).

services:
  - type: web
    name: luna-wa-gateway
    runtime: docker
    dockerfilePath: ./gateway/Dockerfile
    dockerContext: ./gateway
    plan: starter                 # paid web svc does NOT scale-to-zero = always-on
    region: oregon
    healthCheckPath: /health
    numInstances: 1               # a Baileys session has exactly one owner
    disk:
      name: wa-auth               # Baileys creds survive restarts/redeploys
      mountPath: /data/wa-auth
      sizeGB: 1
    envVars:
      - key: WA_AUTH_DIR
        value: /data/wa-auth
      - key: WA_SHARED_SECRET     # HMAC gateway <-> Luna plugin. openssl rand -hex 32
        sync: false
      - key: GATEWAY_ADMIN_KEY    # protects /qr. openssl rand -hex 16
        sync: false
      - key: LUNA_INBOUND_URL     # https://<your-luna-or-tunnel>/api/p/plugin-whatsapp/inbound
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: luna-wa-db
          property: connectionString

databases:
  - name: luna-wa-db
    plan: starter
    region: oregon
    postgresMajorVersion: "16"
